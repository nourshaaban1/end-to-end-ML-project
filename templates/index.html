<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            --secondary-color: #10b981;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --card-bg: #ffffff;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 900px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-section h1 {
            color: white;
            font-weight: 700;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-section p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            background: var(--card-bg);
            margin-bottom: 1.5rem;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 1rem 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header i {
            font-size: 1.2rem;
        }

        .form-section {
            padding: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 0.3rem;
        }

        .form-control, .form-select {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .row {
            margin-bottom: 1rem;
        }

        .btn-predict {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 1rem 2.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #4b5563;
            transform: translateY(-2px);
        }

        .form-text {
            font-size: 0.85rem;
            color: #6b7280;
        }

        .warning-alert {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #92400e;
        }

        .warning-alert i {
            margin-right: 0.5rem;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 2rem;
            padding: 1rem;
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
            margin: 2rem 0;
        }

        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2rem;
            }
            .form-section {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="header-section">
            <h1><i class="bi bi-predictive-analytics"></i> Customer Churn Prediction</h1>
            <p>Enter customer information to predict churn probability and take proactive retention measures</p>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-check"></i> Customer Information
            </div>
            <div class="form-section">
                <form id="predictionForm" method="POST" action="/predict">
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Gender <span class="text-danger">*</span></label>
                            <select name="gender" class="form-select" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Senior Citizen <span class="text-danger">*</span></label>
                            <select name="SeniorCitizen" class="form-select" required>
                                <option value="">Select</option>
                                <option value="0">No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Partner <span class="text-danger">*</span></label>
                            <select name="Partner" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Dependents <span class="text-danger">*</span></label>
                            <select name="Dependents" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Tenure (months) <span class="text-danger">*</span></label>
                            <input type="number" name="tenure" class="form-control" value="1" min="1" max="72" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Service <span class="text-danger">*</span></label>
                            <select name="PhoneService" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Multiple Lines <span class="text-danger">*</span></label>
                            <select name="MultipleLines" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No phone service">No phone service</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Internet Service <span class="text-danger">*</span></label>
                            <select name="InternetService" class="form-select" required>
                                <option value="">Select</option>
                                <option value="DSL">DSL</option>
                                <option value="Fiber optic">Fiber optic</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Online Security <span class="text-danger">*</span></label>
                            <select name="OnlineSecurity" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Online Backup <span class="text-danger">*</span></label>
                            <select name="OnlineBackup" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Device Protection <span class="text-danger">*</span></label>
                            <select name="DeviceProtection" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tech Support <span class="text-danger">*</span></label>
                            <select name="TechSupport" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Streaming TV <span class="text-danger">*</span></label>
                            <select name="StreamingTV" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Streaming Movies <span class="text-danger">*</span></label>
                            <select name="StreamingMovies" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                                <option value="No internet service">No internet service</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Contract <span class="text-danger">*</span></label>
                            <select name="Contract" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Month-to-month">Month-to-month</option>
                                <option value="One year">One year</option>
                                <option value="Two year">Two year</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Paperless Billing <span class="text-danger">*</span></label>
                            <select name="PaperlessBilling" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Payment Method <span class="text-danger">*</span></label>
                            <select name="PaymentMethod" class="form-select" required>
                                <option value="">Select</option>
                                <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                                <option value="Credit card (automatic)">Credit card (automatic)</option>
                                <option value="Electronic check">Electronic check</option>
                                <option value="Mailed check">Mailed check</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Monthly Charges ($) <span class="text-danger">*</span></label>
                            <input type="number" name="MonthlyCharges" class="form-control" value="20" min="18" max="120" step="0.1" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Total Charges ($) <span class="text-danger">*</span></label>
                            <input type="number" name="TotalCharges" class="form-control" value="100" min="18" max="9000" step="0.1" required>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary btn-predict float-end">
                                <i class="bi bi-rocket"></i> Predict Churn
                            </button>
                            <button type="reset" class="btn btn-secondary ms-2">
                                <i class="bi bi-arrow-clockwise"></i> Reset
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="footer">
            <p>Powered by Machine Learning | Customer Churn Prediction System v1.0</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Add hover effects to form controls
        document.querySelectorAll('.form-control, .form-select').forEach(element => {
            element.addEventListener('focus', function() {
                this.style.boxShadow = '0 0 0 3px rgba(99, 102, 241, 0.2)';
            });
            element.addEventListener('blur', function() {
                this.style.boxShadow = 'none';
            });
        });
    </script>
</body>
</html>
